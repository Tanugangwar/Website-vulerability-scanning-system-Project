<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History — VulnScanner</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="nav-container">
                <div class="logo">🛡️ VulnScanner</div>
                <div class="nav-auth">
                    <a href="index.html" class="btn-secondary btn-sm">Scanner</a>
                    <a href="dashboard.html" class="btn-secondary btn-sm">Dashboard</a>
                    <button class="theme-toggle" id="themeToggle">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="/api/logout" class="btn-secondary btn-sm" style="color: var(--accent-rose);"><i class="fas fa-sign-out-alt"></i></a>
                </div>
            </div>
            <h1 class="header__title">Scan History</h1>
            <p class="header__subtitle">Review your past security assessments and historical data.</p>
        </header>

        <div class="history-section">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Website URL</th>
                        <th>Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <!-- History rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const toggle = document.getElementById('themeToggle');
        toggle.addEventListener('click', () => {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            toggle.innerHTML = target === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);
        toggle.innerHTML = savedTheme === 'light' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

        // Load history on page load
        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
